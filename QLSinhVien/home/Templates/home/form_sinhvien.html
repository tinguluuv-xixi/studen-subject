{% extends "home/base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<h1 style="margin-bottom: 1.5rem; font-size: 1.75rem;">{{ title }}</h1>

<form method="POST" style="max-width:500px; background:var(--card); padding:1.5rem; border-radius:8px; box-shadow:0 4px 6px rgba(0,0,0,0.2);">
    {% csrf_token %}
    
    {% for field in form %}
    <div style="margin-bottom:1rem;">
        <label style="display:block; margin-bottom:0.25rem; color:var(--muted);">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
            <p style="color:var(--danger); font-size:0.85rem; margin-top:0.25rem;">{{ field.errors.0 }}</p>
        {% endif %}
    </div>
    {% endfor %}

    <div style="display:flex; gap:0.5rem;">
        <button type="submit" class="btn btn-primary">Lưu</button>
        <a href="{% url 'home:index' %}" class="btn btn-secondary">Hủy</a>
    </div>
</form>

<style>
    form input, form select { width:100%; padding:0.5rem; border-radius:6px; border:1px solid #475569; background:var(--bg); color:var(--text); }
</style>
{% endblock %}
