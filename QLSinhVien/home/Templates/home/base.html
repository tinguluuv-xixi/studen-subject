<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Quản lý sinh viên{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    {% load static %}
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Be Vietnam Pro', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        nav {
            background: var(--card);
            padding: 1rem 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        nav .container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: var(--accent); text-decoration: none; font-weight: 600; }
        nav a:hover { color: var(--accent-hover); }
        nav .nav-links a { margin-left: 1.5rem; }
        main { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .alert { padding: 1rem 1.5rem; border-radius: 8px; margin-bottom: 1rem; }
        .alert-success { background: rgba(34,197,94,0.2); border: 1px solid var(--success); color: var(--success); }
        .alert-error { background: rgba(239,68,68,0.2); border: 1px solid var(--danger); color: var(--danger); }
        .btn { display: inline-block; padding: 0.5rem 1rem; border-radius: 6px; text-decoration: none; font-weight: 500; cursor: pointer; border: none; font-size: 14px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--muted); }
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <a href="{% url 'home:index' %}">🏫 Quản lý sinh viên</a>
            <div class="nav-links">
                <a href="{% url 'home:index' %}">Danh sách</a>
                <a href="{% url 'home:them' %}">Thêm sinh viên</a>
                <a href="/admin/">Admin</a>
            </div>
        </div>
    </nav>
    <main>
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}error{% else %}success{% endif %}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
